name: "Documentation"
description: "Report missing/incorrect docs or propose doc improvements"
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: what
    attributes:
      label: What needs to change?
      description: Describe what is unclear, missing, or incorrect.
    validations:
      required: true
  - type: input
    id: where
    attributes:
      label: Where is the doc?
      description: Link to the page/file/section (URL or path in repo).
      placeholder: "README.md, docs/..., or https://..."
    validations:
      required: false
  - type: textarea
    id: suggested
    attributes:
      label: Suggested wording (optional)
      description: If you have exact wording, paste it here.
    validations:
      required: false
  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - minor (typo/wording)
        - moderate (confusing/outdated)
        - major (blocks setup/usage)
    validations:
      required: true