name: "Bug report"
description: "Report something that isn't working"
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the fields below.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: "When I run ..., I see ..."
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Provide minimal steps to reproduce the behavior.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "I expected ..."
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: "Instead, ..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version/commit
      description: "Release version, tag, or commit SHA (if known)."
      placeholder: "v0.3.1 or 1a2b3c4"
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python/CUDA/etc, hardware, cluster, container image, etc.
      placeholder: |
        - OS:
        - Hardware:
        - Runtime:
        - Other:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs (please remove secrets).
      render: shell
    validations:
      required: false
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - low
        - medium
        - high
        - critical
    validations:
      required: true